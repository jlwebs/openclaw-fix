name: Build and Release DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Swift Version
        run: swift --version

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build JS
        run: pnpm build

      - name: Package macOS App
        env:
          SIGN_IDENTITY: "-" 
          ALLOW_MISSING_TEXTUAL_BUNDLE: "1"
        run: ./scripts/package-mac-app.sh

      - name: Create DMG
        run: |
          mkdir -p release
          hdiutil create -volname "OpenClaw" -srcfolder dist/OpenClaw.app -ov -format UDZO release/OpenClaw.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-mac-dmg
          path: release/OpenClaw.dmg
          retention-days: 7
